<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Data Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <div class="logo">SolarTracker<span> IoT</span></div>
        <ul>
            <li><a href="index.html">Opening</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="tracker.html">3D Tracker</a></li>
            <li><a href="dashboard.html" class="active">Data Analysis</a></li>
        </ul>
    </nav>

    <section class="dashboard-grid">
        <div class="chart-card">
            <h3 style="margin-bottom: 15px; font-size: 1.2rem; color: #ffdd00;">Luminasitas Cahaya (Lux)</h3>
            <canvas id="luxChart"></canvas>
        </div>
        <div class="chart-card">
            <h3 style="margin-bottom: 15px; font-size: 1.2rem; color: var(--accent);">Tegangan Output Panel (Volt)</h3>
            <canvas id="voltChart"></canvas>
        </div>
    </section>

    <section class="dashboard-grid" style="padding-top: 0;">
        <div class="chart-card">
            <h3 style="color: #ffdd00; margin-bottom: 10px;">Log Data Otomatis (Real-Time)</h3>
            <div style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Lux</th>
                            <th>Volt</th>
                            <th>Posisi (Az/El)</th>
                        </tr>
                    </thead>
                    <tbody id="autoLogBody"></tbody>
                </table>
            </div>
        </div>

        <div class="chart-card">
            <h3 style="color: var(--accent); margin-bottom: 10px;">Log Perintah Manual (Interactive)</h3>
            <div style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Target Az/El</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="manualLogBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // Set Default Font & Text Color Chart.js agar seragam dengan tema gelap CSS kamu
        Chart.defaults.font.family = "'Poppins', sans-serif";
        Chart.defaults.color = '#ffffff';

        const chartAnimation = {
            duration: 400, // Dipercepat dikit biar transisi pergerakan grafik lebih responsif
            easing: 'easeInOutQuart'
        };

        // Inisialisasi Grafik Lux (Kuning/Sinar Matahari)
        const ctxLux = document.getElementById('luxChart').getContext('2d');
        const luxChartInstance = new Chart(ctxLux, {
            type: 'line',
            data: {
                labels: [], // Kosong di awal, akan di-plot dinamis oleh data ESP32
                datasets: [{
                    label: 'Intensitas Cahaya (Lux)',
                    data: [],
                    borderColor: '#ffdd00',
                    backgroundColor: 'rgba(255, 221, 0, 0.08)', 
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#ffdd00'
                }]
            },
            options: { 
                responsive: true, 
                animation: chartAnimation,
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // Inisialisasi Grafik Tegangan Panel (Cyan/Sesuai --accent CSS)
        const ctxVolt = document.getElementById('voltChart').getContext('2d');
        const voltChartInstance = new Chart(ctxVolt, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Tegangan (Volt)',
                    data: [],
                    borderColor: '#00f2fe',
                    backgroundColor: 'rgba(0, 242, 254, 0.08)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#00f2fe'
                }]
            },
            options: { 
                responsive: true, 
                animation: chartAnimation,
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // --- MANAJEMEN WEBSOCKET ---
        const gateway = `ws://192.168.102.82/ws`; 
        let socket;

        function initWebSocket() {
            socket = new WebSocket(gateway);
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                // Format penanda waktu: HH:MM:SS
                const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // 1. TANGKAP DATA TELEMETRI ALAT
                if (data.type === "telemetry") {
                    const azVal = Number(data.az) || 0;
                    const elVal = Number(data.el) || 0;
                    const luxVal = Number(data.lux) || 0;
                    const voltVal = Number(data.volt) || 0;

                    // Suntik data ke tabel log otomatis
                    const autoBody = document.getElementById('autoLogBody');
                    if (autoBody) {
                        const row = autoBody.insertRow(0);
                        row.innerHTML = `<td>${nowTime}</td><td>${luxVal.toFixed(0)}</td><td>${voltVal.toFixed(2)} V</td><td>${azVal.toFixed(0)}°/${elVal.toFixed(0)}°</td>`;
                        if (autoBody.rows.length > 15) autoBody.deleteRow(15);
                    }

                    // Suntik data titik baru ke dalam grafik
                    luxChartInstance.data.labels.push(nowTime);
                    voltChartInstance.data.labels.push(nowTime);

                    luxChartInstance.data.datasets[0].data.push(luxVal);
                    voltChartInstance.data.datasets[0].data.push(voltVal);

                    // Geser grafik (shift) jika sumbu X sudah lebih dari 10 data agar tidak sesak
                    if (luxChartInstance.data.labels.length > 10) {
                        luxChartInstance.data.labels.shift();
                        luxChartInstance.data.datasets[0].data.shift();
                        voltChartInstance.data.labels.shift();
                        voltChartInstance.data.datasets[0].data.shift();
                    }

                    // Render perubahan grafik secara real-time
                    luxChartInstance.update();
                    voltChartInstance.update();
                } 
                
                // 2. TANGKAP DATA LOG BALIKAN SAAT USER KLIK KUBAH 3D DI HALAMAN SEBELAH
                else if (data.type === "manual_log" || data.type === "cmd") {
                    const manualBody = document.getElementById('manualLogBody');
                    if (manualBody) {
                        const row = manualBody.insertRow(0);
                        row.style.color = "var(--accent)";
                        row.innerHTML = `<td>${nowTime}</td><td>${Number(data.az).toFixed(1)}° / ${Number(data.el).toFixed(1)}°</td><td>Executed</td>`;
                        if (manualBody.rows.length > 10) manualBody.deleteRow(10);
                    }
                }
            };

            socket.onclose = () => {
                setTimeout(initWebSocket, 2000); // Auto reconnect jika jaringan ESP terganggu
            };
        }

        window.onload = () => {
            initWebSocket();
        };
    </script>
</body>
</html>
