<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Data Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <div class="logo">SolarTracker<span> IoT</span></div>
        <ul>
            <li><a href="index.html">Opening</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="tracker.html">3D Tracker</a></li>
            <li><a href="dashboard.html" class="active">Data Analysis</a></li>
        </ul>
    </nav>

    <section class="dashboard-grid">
        <div class="chart-card">
            <h3>Luminasitas Cahaya (Lux)</h3>
            <canvas id="luxChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Tegangan Output Panel (Volt)</h3>
            <canvas id="voltChart"></canvas>
        </div>
    </section>

    <section class="dashboard-grid" style="grid-template-columns: 1fr 1fr; margin-top: 20px;">
        <div class="table-section chart-card">
            <h3 style="color: #00f2fe;">Log Data Otomatis (Real-Time)</h3>
            <div style="max-height: 400px; overflow-y: auto;">
                <table id="autoTable">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Lux</th>
                            <th>Volt</th>
                            <th>Posisi (Az/El)</th>
                        </tr>
                    </thead>
                    <tbody id="autoLogBody"></tbody>
                </table>
            </div>
        </div>

        <div class="table-section chart-card">
            <h3 style="color: #ffdd00;">Log Perintah Manual (Interactive)</h3>
            <div style="max-height: 400px; overflow-y: auto;">
                <table id="manualTable">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Target Az/El</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="manualLogBody"></tbody>
                </table>
            </div>
        </div>
    </section>
<script>
    // Konfigurasi Animasi Global agar halus
    const chartAnimation = {
        duration: 1000,      // Durasi animasi 1 detik
        easing: 'easeInOutQuart', // Efek percepatan yang smooth
        lazy: false
    };

    // --- Chart Luminasitas (Lux) ---
    const ctxLux = document.getElementById('luxChart').getContext('2d');
    new Chart(ctxLux, {
        type: 'line',
        data: {
            labels: ['12:00', '12:05', '12:10', '12:15', '12:20'],
            datasets: [{
                label: 'Lux',
                data: [45000, 52000, 61000, 58000, 65000],
                borderColor: '#00f2fe', // Biru Muda
                backgroundColor: 'rgba(0, 242, 254, 0.1)', // Isi bawah garis
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: '#00f2fe'
            }]
        },
        options: { 
            responsive: true, 
            animation: chartAnimation, // Terapkan animasi
            scales: { 
                y: { 
                    beginAtZero: true,
                    grid: { color: 'rgba(255, 255, 255, 0.05)' } 
                },
                x: { 
                    grid: { display: false } 
                }
            },
            plugins: {
                legend: { labels: { color: '#ffffff' } }
            }
        }
    });

    // --- Chart Tegangan (Volt) ---
    const ctxVolt = document.getElementById('voltChart').getContext('2d');
    new Chart(ctxVolt, {
        type: 'line',
        data: {
            labels: ['12:00', '12:05', '12:10', '12:15', '12:20'],
            datasets: [{
                label: 'Voltage',
                data: [12.4, 13.1, 14.2, 13.8, 14.5],
                borderColor: '#ffdd00', // Kuning (Agar kontras sesuai ide manualmu tadi)
                backgroundColor: 'rgba(255, 221, 0, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: '#ffdd00'
            }]
        },
        options: { 
            responsive: true, 
            animation: chartAnimation, // Terapkan animasi
            scales: { 
                y: { 
                    beginAtZero: false, // Volt jarang mulai dari 0
                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                }
            },
            plugins: {
                legend: { labels: { color: '#ffffff' } }
            }
        }
    });
</script>
</body>
</html>
